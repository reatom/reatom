name: Test

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened,  ready_for_review]
  push:
    branches:
      - v1001

jobs:
  test:
    timeout-minutes: 2
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@1e1c8eafbd745f64b1ef30a7d7ed7965034c486c
        with:
          cache: true
          cache_dependency_path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --filter @reatom/core... --filter @reatom/react... --filter @reatom/jsx... --filter @reatom/zod... install --ignore-scripts

      - name: Build core package
        run: pnpm --filter @reatom/core run build

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail

          pids=()

          pnpm --filter @reatom/core run test:unit &
          pids+=("$!")

          pnpm --filter @reatom/core run test:browser &
          pids+=("$!")

          pnpm --parallel --filter @reatom/react --filter @reatom/jsx --filter @reatom/zod run test &
          pids+=("$!")

          failed=0

          for pid in "${pids[@]}"; do
            if ! wait "$pid"; then
              failed=1
            fi
          done

          exit "$failed"
