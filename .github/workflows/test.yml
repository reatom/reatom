name: Test

on: workflow_call

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '24.2'
          cache: pnpm
      - name: Install dependencies
        run: |
          pnpm ci --ignore-scripts
          pnpx playwright install --with-deps chromium
      - name: Run tests
        run: node --run test
