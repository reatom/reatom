name: Test

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened,  ready_for_review]
  push:
    branches:
      - v1001

jobs:
  test:
    timeout-minutes: 2
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@1e1c8eafbd745f64b1ef30a7d7ed7965034c486c
        with:
          cache: true
          cache_dependency_path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --filter @reatom/core... --filter @reatom/react... --filter @reatom/jsx... --filter @reatom/zod... --filter reatom-jsx-gallery... install --ignore-scripts

      - name: Build core package
        run: pnpm --filter @reatom/core run build

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail

          (
            failed=0

            pnpm --filter @reatom/core run test:unit &
            core_unit_pid="$!"

            pnpm --filter @reatom/zod run test &
            zod_pid="$!"

            wait "$core_unit_pid" || failed=1
            wait "$zod_pid" || failed=1

            exit "$failed"
          ) &
          unit_pid="$!"

          (
            pnpm --filter @reatom/core run test:browser
            pnpm --filter @reatom/react run test
            pnpm --filter @reatom/jsx run test
            pnpm --filter reatom-jsx-gallery run test:fixtures
          ) &
          browser_pid="$!"

          failed=0

          wait "$unit_pid" || failed=1
          wait "$browser_pid" || failed=1

          exit "$failed"
