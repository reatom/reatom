name: Lint markdown

on:
  pull_request:
    paths:
      - **.md
      - **.mdx
  push:
    branches:
      - v1000

jobs:
  remark-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '24.2.0'
          cache: pnpm
      - run: pnpm ci --ignore-scripts
      - run: node --run lint:md
