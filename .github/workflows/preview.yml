name: Preview

on:
  push:
    branches:
      - v1001
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions: {}

jobs:
  pr-note:
    timeout-minutes: 1
    runs-on: ubuntu-slim
    if: github.event_name == 'pull_request'
    steps:
      - run: echo "Preview publishing is available from the manual workflow_dispatch run."

  packages-changed:
    timeout-minutes: 1
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      pull-requests: read
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/github-script@v8
        id: script
        env:
          PACKAGE_FILE_REGEX: ^packages\/(?:core|react)\/

        with:
          retries: 3
          script: |
            const packageFileMask = new RegExp(process.env.PACKAGE_FILE_REGEX)

            let filenames = []

            if (context.eventName === 'push') {
              const { execSync } = require('child_process')
              const before = context.payload.before
              const after = context.sha
              const emptySha = '0000000000000000000000000000000000000000'

              if (before && before !== emptySha) {
                filenames = execSync(`git diff --name-only ${before} ${after}`, { encoding: 'utf8' })
                  .trim()
                  .split('\n')
                  .filter(Boolean)
              } else {
                filenames = execSync('git ls-files packages/', { encoding: 'utf8' })
                  .trim()
                  .split('\n')
                  .filter(Boolean)
              }
            } else if (context.eventName === 'workflow_dispatch') {
              const { execSync } = require('child_process')

              filenames = execSync('git ls-files packages/', { encoding: 'utf8' })
                .trim()
                .split('\n')
                .filter(Boolean)
            }

            const hasPackagesChanged = filenames.some(path => packageFileMask.test(path))

            core.setOutput('has-packages-changed', hasPackagesChanged)

    outputs:
      has-packages-changed: ${{ steps.script.outputs.has-packages-changed }}

  publish:
    timeout-minutes: 1
    runs-on: ubuntu-latest
    needs: packages-changed
    if: needs.packages-changed.outputs.has-packages-changed == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '24.2'

      - name: Setup pnpm
        uses: pnpm/action-setup@1e1c8eafbd745f64b1ef30a7d7ed7965034c486c
        with:
          cache: true
          cache_dependency_path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm --filter @reatom/react run build

      - name: Publish packages
        run: pnpm dlx pkg-pr-new publish packages/core packages/react --packageManager=pnpm --pnpm
