name: Preview

on:
  push:
    branches:
      - v1001
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions: {}

jobs:
  pr-note:
    timeout-minutes: 1
    runs-on: ubuntu-slim
    if: github.event_name == 'pull_request'
    steps:
      - run: echo "Preview publishing is available from the manual workflow_dispatch run."

  packages-changed:
    timeout-minutes: 1
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      pull-requests: read
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/github-script@v8
        id: script
        env:
          PACKAGE_FILE_REGEX: ^packages\/.*\.(?:ts|js|tsx|json)$
          # this regex is used to extract package root from the changed path
          # so it should match the root
          ROOT_MASK_REGEX: packages\/[^\/]+

        with:
          retries: 3
          script: |
            const packageFileMask = new RegExp(process.env.PACKAGE_FILE_REGEX)
            const mask = new RegExp(process.env.ROOT_MASK_REGEX)

            let filenames = []

            if (context.eventName === 'push') {
              const { execSync } = require('child_process')
              const before = context.payload.before
              const after = context.sha
              const emptySha = '0000000000000000000000000000000000000000'

              if (before && before !== emptySha) {
                filenames = execSync(`git diff --name-only ${before} ${after}`, { encoding: 'utf8' })
                  .trim()
                  .split('\n')
                  .filter(Boolean)
              } else {
                filenames = execSync('git ls-files packages/', { encoding: 'utf8' })
                  .trim()
                  .split('\n')
                  .filter(Boolean)
              }
            } else if (context.eventName === 'workflow_dispatch') {
              const { execSync } = require('child_process')

              filenames = execSync('git ls-files packages/', { encoding: 'utf8' })
                .trim()
                .split('\n')
                .filter(Boolean)
            }

            const matchedPaths = filenames.filter(path => packageFileMask.test(path))

            const packageRoots = new Set(
              matchedPaths.map(path => path.match(mask)?.[0] ?? null)
            )
            packageRoots.delete(null)

            core.setOutput('packages', Array.from(packageRoots))
            core.setOutput('has-packages-changed', packageRoots.size > 0)

    outputs:
      package-roots: ${{ steps.script.outputs.packages }}
      has-packages-changed: ${{ steps.script.outputs.has-packages-changed }}

  publish:
    timeout-minutes: 1
    runs-on: ubuntu-latest
    needs: packages-changed
    if: needs.packages-changed.outputs.has-packages-changed == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '24.2'

      - name: Setup pnpm
        uses: pnpm/action-setup@1e1c8eafbd745f64b1ef30a7d7ed7965034c486c
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install

      - name: Publish packages
        env:
          PKGS: ${{ join(fromJSON(needs.packages-changed.outputs.package-roots), ' ') }}
        run: pnpm dlx pkg-pr-new publish $PKGS --packageManager=pnpm --pnpm
