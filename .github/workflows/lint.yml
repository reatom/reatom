name: Lint

on: workflow_call

jobs:
  prettier:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.2.0
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm i --stream
      - name: Run prettier check
        id: prettier_check
        continue-on-error: true
        run: |
          trap 'echo "PRETTIER_EXIT_CODE=$?" >> $GITHUB_OUTPUT' EXIT; pnpm run prettify:check
      - name: Fail if there no auto fix
        if: steps.prettier_check.outputs.PRETTIER_EXIT_CODE == 2
        run: exit 2
      - name: Run prettier
        id: prettier_run
        if: steps.prettier_check.outputs.PRETTIER_EXIT_CODE == 1
        run: pnpm run prettify
      - name: Commit and push changes
        if: ${{ success() && steps.prettier_run.conclusion == 'success' }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -am "chore: run prettier"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Upload artifact to trigger app for forks
        if: ${{ failure() }}
        run: |
          cat <<EOF > flow-comment.json
            {
              "name": "comment",
              "payload": {
                "issue_number": "${{ github.event.pull_request.number }}",
                "message": "CI is unable to auto-fix prettier, please do it yourself by running \`pnpm run prettify\`."
              }
            }
          EOF
      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: flow
          path: 'flow-comment.json'
      - name: Exit with prettier
        run: exit ${{ steps.prettier_check.outputs.PRETTIER_EXIT_CODE }}
