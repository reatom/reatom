name: Lint

on: workflow_call

jobs:
  prettier:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        if: ${{ !github.head_ref }}
        with:
          fetch-depth: 0

      - uses: actions/checkout@v4
        if: ${{ github.head_ref }}
        with:
          ref: ${{ github.head_ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '24.2'

      - name: Setup pnpm
        uses: pnpm/action-setup@1e1c8eafbd745f64b1ef30a7d7ed7965034c486c
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --ignore-scripts
      - name: Run prettier check
        id: prettier_check
        continue-on-error: true
        run: |
          trap 'echo "PRETTIER_EXIT_CODE=$?" >> $GITHUB_OUTPUT' EXIT; node --run prettify:check
      - name: Fail if there no auto fix
        if: steps.prettier_check.outputs.PRETTIER_EXIT_CODE == 2
        run: exit 2

      - name: Run prettier
        id: prettier_run
        if: steps.prettier_check.outputs.PRETTIER_EXIT_CODE == 1
        run: node --run prettify

      - name: Commit and push changes
        if: ${{ success() && steps.prettier_run.conclusion == 'success' }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -am "chore: run prettier"
          git push origin HEAD:${HEAD_REF}
        env:
          HEAD_REF: ${{ github.head_ref || github.ref_name }}

      - name: Upload artifact to trigger app for forks
        if: ${{ failure() && github.head_ref }}
        run: |
          cat <<EOF > flow-comment.json
            {
              "name": "comment",
              "payload": {
                "issue_number": "${{ github.event.pull_request.number }}",
                "message": "CI is unable to auto-fix prettier, please do it yourself by running \`node --run prettify\`."
              }
            }
          EOF
      - uses: actions/upload-artifact@v4
        if: ${{ failure() && github.head_ref }}
        with:
          name: flow
          path: 'flow-comment.json'
      - name: Exit with prettier
        run: exit $PRETTIER_EXIT_CODE
        env:
          PRETTIER_EXIT_CODE: ${{ steps.prettier_check.outputs.PRETTIER_EXIT_CODE }}
