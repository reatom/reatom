name: Publish PR version on pkg.pr.new
on: workflow_call

permissions: {}

jobs:
  packages-changed:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: '24.2'

      - run: npm install picomatch@4.0.3

      - uses: actions/github-script@v8
        id: script
        env:
          GLOB: packages/**/*.{ts,js,tsx,json}
          # this regex is used to extract package root from the changed path
          # so it should match the root
          ROOT_MASK_REGEX: packages\/[^\/]+

        with:
          retries: 3
          script: |
            const picomatch = require('picomatch')
            const isMatch = picomatch(process.env.GLOB)
            const mask = new RegExp(process.env.ROOT_MASK_REGEX)

            const changedFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100
            })

            const matchedPaths = changedFiles
              .map(f => f.filename)
              .filter(path => isMatch(path))

            const packageRoots = new Set(
              matchedPaths.map(path => path.match(mask)?.[0] ?? null)
            )
            packageRoots.delete(null)

            core.setOutput('packages', Array.from(packageRoots))
            core.setOutput('has-packages-changed', packageRoots.size > 0)

    outputs:
      package-roots: ${{ steps.script.outputs.packages }}
      has-packages-changed: ${{ steps.script.outputs.has-packages-changed }}

  publish:
    runs-on: ubuntu-latest
    needs: packages-changed
    if: needs.packages-changed.outputs.has-packages-changed == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '24.2'

      - name: Setup pnpm
        uses: pnpm/action-setup@1e1c8eafbd745f64b1ef30a7d7ed7965034c486c
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install

      - name: Publish packages
        env:
          PKGS: ${{ join(fromJSON(needs.packages-changed.outputs.package-roots), ' ') }}
        run: pnpm dlx pkg-pr-new publish $PKGS --packageManager=pnpm
